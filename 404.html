<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - Baritone Research">
    <title>404 - Page Not Found | Baritone Research</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-background-light);
            padding: var(--spacing-md);
        }

        .error-content {
            text-align: center;
            max-width: 600px;
        }

        .error-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: var(--spacing-xl);
        }

        .error-logo-image {
            height: 60px;
            width: auto;
        }

        .error-logo-text-stack {
            display: flex;
            flex-direction: column;
            line-height: 1;
            gap: 3px;
            margin-top: 7px;
        }

        .error-logo-main {
            font-family: var(--font-heading);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1.2px;
            color: var(--color-primary-dark);
        }

        .error-logo-sub {
            font-family: var(--font-heading);
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 2.2px;
            color: var(--color-primary-dark);
            margin-left: 2px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: var(--color-primary);
            line-height: 1;
            margin-bottom: var(--spacing-md);
            font-family: var(--font-heading);
        }

        .error-title {
            font-size: var(--font-size-h2);
            color: var(--color-text);
            margin-bottom: var(--spacing-md);
        }

        .error-message {
            font-size: var(--font-size-large);
            color: var(--color-text-light);
            margin-bottom: var(--spacing-xl);
            line-height: 1.6;
        }

        .error-button {
            display: inline-block;
            padding: 16px 32px;
            background-color: var(--color-primary);
            color: var(--color-white);
            border-radius: 4px;
            font-family: var(--font-heading);
            font-size: var(--font-size-base);
            font-weight: 600;
            text-decoration: none;
            transition: all var(--transition-medium);
        }

        .error-button:hover {
            background-color: var(--color-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(107, 30, 46, 0.3);
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 80px;
            }

            .error-title {
                font-size: var(--font-size-h3);
            }

            .error-message {
                font-size: var(--font-size-base);
            }

            .error-logo-image {
                height: 50px;
            }

            .error-logo-main {
                font-size: 22px;
            }

            .error-logo-sub {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-logo">
                <img src="assets/images/B - Logo White.jpg" alt="B Logo" class="error-logo-image">
                <div class="error-logo-text-stack">
                    <span class="error-logo-main">BARITONE</span>
                    <span class="error-logo-sub">RESEARCH</span>
                </div>
            </div>
            
            <div class="error-code">404</div>
            
            <h1 class="error-title">Page not found</h1>
            
            <p class="error-message">The page you are looking for may have moved or no longer exists.</p>
            
            <a href="index.html" class="error-button">Return to Homepage</a>
        </div>
    </div>
</body>
</html>
